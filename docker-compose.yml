version: '3.8'
services:
  db:
    image: postgres:15
    container_name: agenda_equilibrar_db
    environment:
      POSTGRES_USER: equilibrar_user
      POSTGRES_PASSWORD: equilibrar_password
      POSTGRES_DB: agenda_equilibrar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
