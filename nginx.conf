server {
    listen 80;
    server_name agenda.clinicaequilibrar.cl;

    # Directorio donde se subirá el frontend build (MobaXterm)
    root /var/www/agenda-equilibrar/dist;
    index index.html;

    # Configuración principal para React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso hacia el backend en Node.js (Express)
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Opcional: headers para la IP real
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addrs;
    }

    # Configuración de archivos estáticos (cachar caché para imágenes/JS/CSS)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # Bloquear accesos a archivos ocultos (seguridad)
    location ~ /\. {
        deny all;
    }
}
